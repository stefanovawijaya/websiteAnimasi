<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 1</title>
    <style>
        body{
            background-image: url('background.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            display:flex;
            justify-content:center;
            flex-direction: column;
        }
        h1{
            color: white;
            text-shadow: 0 0 50px #38b6ff;
            text-align: center;
            font-size: 160px;
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        p{
            color: white;
            text-shadow: 0 0 50px #38b6ff;
            text-align: center;
            font-size: 36px;
            margin-left: 70px;
            margin-right: 70px;
            margin-top: -16px;
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        .container{
            display:flex;
            flex-direction: column;
            justify-content:center;
            align-items:center;
            border-radius:10px;

            /* Animasi */
            opacity:0;
            transform:translateY(-80px);

            animation: fadeDown 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeDown{

            from{
                opacity:0;
                transform:translateY(-80px);
            }   

            to{
                opacity:1;
                transform:translateY(0);
            }

        }
    </style>
</head>
<body>
    <div class="container" onclick="movePage()">
        <h1>Why Coding?</h1>
        <p>Learning to code helps develop logical thinking, analytical skills, and the ability to solve problems systematically. Additionally, coding opens up career opportunities in the technology industry and enables people to create useful applications, websites, and other digital solutions.</p>
    </div>
    <script>
        function movePage(){
            try {
                // Navigate to another page (relative or absolute URL)
                window.location.href = "page2.html"; 
            } catch (error) {
                console.error("Navigation failed:", error);
                alert("Unable to navigate to the page.");
            }
        }
    </script>
</body>
</html>
