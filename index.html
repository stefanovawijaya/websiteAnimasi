<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <style>
        body{
            background-image: url('background.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            display:flex;
            justify-content:center;
        }
        h1{
            color: white;
            text-shadow: 0 0 50px #38b6ff;
            text-align: center;
            font-size: 160px;
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        .container{
            display:flex;
            justify-content:center;
            align-items:center;
            border-radius:10px;

            /* Animasi */
            opacity:0;
            transform:translateY(-80px);

            animation: fadeDown 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeDown{

            from{
                opacity:0;
                transform:translateY(-80px);
            }   

            to{
                opacity:1;
                transform:translateY(0);
            }

        }
    </style>
</head>
<body>
    <div class="container">
        <h1 onclick="movePage()">KODING & KECERDASAN ARTIFISIAL</h1>
    </div>
    
    <script>
        function movePage(){
            try {
                // Navigate to another page (relative or absolute URL)
                window.location.href = "page1.html"; 
            } catch (error) {
                console.error("Navigation failed:", error);
                alert("Unable to navigate to the page.");
            }
        }
    </script>
</body>
</html>
